<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
      integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Playfair+Display:ital,wght@1,500;1,600&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ink font-body text-white antialiased">
    <div>
      <header
        class="w-full px-5 sm:px-8 lg:px-12 py-5 flex items-center justify-between bg-ink relative z-20"
      >
        <!-- Logo -->
        <div>
          <img src="./img/roboot logo.png" alt="" class="w-16" />
        </div>

        <!-- Desktop nav links -->
        <nav
          class="hidden md:flex items-center gap-10 text-[15px] text-white/90"
        >
          <a href="./index.html" class="hover:text-amber transition-colors">Home</a>
          <a href="#" class="hover:text-amber transition-colors">Gallery</a>
          <a href="#" class="hover:text-amber transition-colors">Blog</a>
          <a href="#" class="hover:text-amber transition-colors">Contact us</a>
        </nav>

        <!-- Register button (desktop) -->
        <a
          href="#register"
          class="hidden md:inline-flex items-center justify-center bg-amber text-skyblue font-semibold text-[15px] px-6 py-2 rounded-full hover:brightness-105 active:scale-95 transition"
        >
          Register
        </a>

        <!-- Mobile hamburger -->
        <button
          id="menuBtn"
          class="md:hidden text-white p-2 -mr-2"
        >
        <i id="iconOpen" class="fa-solid fa-bars"></i>
        <i id="iconClose" class="fa-solid fa-plus hidden"></i>
        </button>
      </header>

      <!-- Mobile menu panel -->
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-ink border-t border-white/10 px-6 py-6 flex flex-col gap-5 text-base relative z-20"
      >
        <a href="index.html" class="hover:text-amber transition-colors">Home</a>
        <a href="#" class="hover:text-amber transition-colors">Gallery</a>
        <a href="#" class="hover:text-amber transition-colors"
          >Blog</a
        >
        <a href="#" class="hover:text-amber transition-colors">Contact us</a>
        <a
          href="#register"
          class="inline-flex items-center justify-center bg-amber text-skyblue font-semibold px-6 py-2.5 rounded-full w-fit"
        >
          Register
        </a>
      </div>
    </div>

    <main>

       <h1 class="text-4xl font-bold text-center py-8">
         Blog Posts
    </h1>

    <div class="blogs max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-6 pb-10">
    </div>

    <template id="blog-section">
        <div class="bg-white border border-gray-200 shadow-lg rounded-lg p-6">
            <h2 class="title text-2xl font-bold text-black mb-4"></h2>

            <p class="body text-gray-600 mb-4"></p>

            <div class="mb-4">
                <!-- <strong>Tags:</strong> -->
                <div class="tags mt-2"></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 text-center">
                <p class="views bg-blue-400 p-3 rounded-full font-medium"></p>
                <p class="likes bg-red-500 p-3 rounded-full font-medium"></p>
                <p class="dislikes bg-amber-400 p-3 rounded-full font-medium"></p>
            </div>
        </div>
    </template>


    </main>

    <!-- ============ FOOTER ============ -->
    <footer class="bg-ink px-5 sm:px-8 lg:px-14 py-10 sm:py-12 border border-amber-50">
      <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center sm:items-start justify-between gap-8">
 
        <!-- Logo + tagline -->
        <div class="flex flex-col items-center sm:items-start gap-1">
          <div class="flex items-center gap-2">
           <img src="./img/roboot logo.png" alt="" class="w-20">
            <span class="font-display font-extrabold text-white text-6xl">tech urban</span>
          </div>
          <span class="text-amber font-semibold text-sm ml-24">Connect. Innovate. Grow.</span>
        </div>
 
        <!-- Nav columns -->
        <div class="flex items-start gap-12 sm:gap-16 text-white/90 text-[15px]">
          <div class="flex flex-col gap-3">
            <a href="#" class="hover:text-amber transition-colors">Home</a>
            <a href="#" class="hover:text-amber transition-colors">Gallery</a>
            <a href="#" class="hover:text-amber transition-colors">Blog</a>
          </div>
          <div class="flex flex-col gap-3">
            <a href="#" class="hover:text-amber transition-colors">Contact us</a>
          </div>
        </div>
 
        
        </div>
        <!-- Social icons -->
        <div class="grid grid-cols-1 md:grid-cols-2 justify-center gap-20 mt-24">
          <div>
            <p>© 2026 Tech Urban Conference. All rights reserved.</p>
          </div>

            <div class="flex items-center gap-5 text-white/90">
          <a href="#"  class="text-white hover:opacity-70 transition"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" aria-label="Facebook" class="text-white hover:opacity-70 transition"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" aria-label="Twitter" class="text-white hover:opacity-70 transition"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" aria-label="Instagram" class="text-white hover:opacity-70 transition"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="LinkedIn" class="text-white hover:opacity-70 transition"><i class="fa-brands fa-linkedin"></i></a>
        </div>
          </div>
      </div>
    </footer>

    <script src="src/script.js"></script>
    <script src="src/config.js"></script>
  </body>
</html>
